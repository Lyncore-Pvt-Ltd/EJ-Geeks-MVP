# Enforcing Branch Naming Convention

name: Branch Naming Convention
run-name: "Evaluate new branch [${{ github.ref_name }}]"
on:
  create:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # Branches exempt from naming rules
          EXEMPT="^(main|dev|dev-stage|staging|develop)$"
          if echo "$BRANCH" | grep -Eq "$EXEMPT"; then
            echo "✅ Exempt branch '$BRANCH' — skipping check"
            exit 0
          fi

          # Your naming convention regex
          PATTERN="^(fe|be|infra|config)\/(feat|fix|hotfix|docs|refactor|chore|release)\/[a-z0-9][a-z0-9\-]+$"

          if echo "$BRANCH" | grep -Eq "$PATTERN"; then
            echo "✅ Branch name '$BRANCH' is valid"
          else
            echo "❌ Branch name '$BRANCH' does not match naming convention"
            echo ""
            echo "Expected format: <area>/<type>/<descriptor>"
            echo "Areas:  fe | be | infra | config"
            echo "Types:  feat | fix | hotfix | docs | refactor | chore | release"
            echo "Example: fe/feat/ed-110  or  be/fix/ed-45"
            echo ""
            echo "Deleting invalid branch..."
            ENCODED_BRANCH=$(python3 -c 'import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))' "$BRANCH")
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${ENCODED_BRANCH}"
            exit 1
          fi
